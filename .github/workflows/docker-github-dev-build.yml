name: DEV - build & publish branch containers

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      containers:
        description: "Comma-separated container names to build, or 'all' for all containers"
        type: string
        default: "all"

env:
  REGISTRY: ghcr.io
  DEV_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}/

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.detect.outputs.containers }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect containers to build
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ inputs.containers }}"
            if [[ "$INPUT" == "all" ]]; then
              CONTAINERS=$(ls -d containers/*/ | xargs -I{} basename {} | jq -R . | jq -sc .)
            else
              CONTAINERS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
            fi
            echo "containers=$CONTAINERS" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Push event: detect changed container directories
          BEFORE="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          # Fall back to origin/main if BEFORE is the zero SHA (new branch)
          # or if the commit no longer exists (e.g. after a force-push/amend)
          if [[ "$BEFORE" == "$ZERO_SHA" ]] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Before SHA not available, falling back to origin/main"
            BEFORE=$(git rev-parse origin/main 2>/dev/null || echo "")
            if [[ -z "$BEFORE" ]]; then
              echo "No base commit found, skipping builds"
              echo "containers=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          CHANGED=()

          for CONTAINER_DIR in containers/*/; do
            CONTAINER=$(basename "$CONTAINER_DIR")
            if git diff --name-only "$BEFORE" HEAD -- "$CONTAINER_DIR" | grep -q .; then
              CHANGED+=("$CONTAINER")
            fi
          done

          # python-apps-base also depends on src/, pyproject.toml, Taskfile.dist.yml
          if git diff --name-only "$BEFORE" HEAD -- src/ pyproject.toml Taskfile.dist.yml | grep -q .; then
            if [[ ! " ${CHANGED[*]} " =~ " python-apps-base " ]]; then
              CHANGED+=("python-apps-base")
            fi
          fi

          # Cascade: python-base change also triggers python-apps-base rebuild
          if [[ " ${CHANGED[*]} " =~ " python-base " ]]; then
            if [[ ! " ${CHANGED[*]} " =~ " python-apps-base " ]]; then
              CHANGED+=("python-apps-base")
            fi
          fi

          if [[ ${#CHANGED[@]} -eq 0 ]]; then
            echo "No container sources changed"
            echo "containers=[]" >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -sc .)
            echo "Containers to build: $JSON"
            echo "containers=$JSON" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.containers != '[]'
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.detect-changes.outputs.containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.container == 'python-apps-base'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and build library
        if: matrix.container == 'python-apps-base'
        env:
          PUBLIC_IMAGE_REGISTRY_BASE: ${{ env.DEV_REGISTRY_PATH }}
        run: |
          pip install go-task-bin==${{ env.TASKFILE_VERSION }}
          task init:ci
          task build-dev
          cp ./dist/arduino*.whl ./containers/python-apps-base/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=ref,event=branch
            type=ref,event=branch,suffix=-${{ github.run_number }}
          images: ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            BASE_IMAGE_VERSION=${{ steps.meta.outputs.version }}

      # TODO: once all packages are manually set to private in the GHCR UI, this step can be removed.
      # (ghcr.io/<owner> → Package settings → Change visibility → Private)
      - name: Ensure package visibility is private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PKG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('app-bricks/${{ matrix.container }}', safe=''))")
          ACCOUNT_TYPE=$(gh api "/users/$OWNER" --jq '.type')
          if [[ "$ACCOUNT_TYPE" == "Organization" ]]; then
            gh api --method PATCH "/orgs/$OWNER/packages/container/${PKG}" -f visibility=private
          else
            gh api --method PATCH "/user/packages/container/${PKG}" -f visibility=private
          fi
