name: BRICKS Container Release - Build and Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "release/*"

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_DESTINATION_ORG: ghcr.io/arduino
  GH_DESTINATION_REPO: https://github.com/arduino/app-bricks-py

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      prev_version: ${{ steps.check.outputs.prev_version }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if container sources changed since last release
        id: check
        run: |
          # Extract the new version from the tag (release/X.Y.Z -> X.Y.Z)
          NEW_VERSION="${GITHUB_REF_NAME#release/}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          git fetch --tags

          # Find the previous release/* tag (second most recent)
          PREV_TAG=$(git tag --sort=-version:refname | grep "^release/" | sed -n '2p')

          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous release tag found — building from scratch"
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "prev_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          PREV_VERSION="${PREV_TAG#release/}"
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous release tag: $PREV_TAG (version: $PREV_VERSION)"

          # Check if python-apps-base sources changed since the previous tag
          CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- \
            containers/python-apps-base/ \
            src/ \
            pyproject.toml \
            Taskfile.dist.yml)

          if [[ -n "$CHANGED" ]]; then
            echo "Container sources changed since $PREV_TAG — full build required"
            echo "$CHANGED"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "No container source changes since $PREV_TAG — will re-tag existing image"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

  upload-whl:
    runs-on: ubuntu-latest
    needs: [check-changes]
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and build library
        env:
          PUBLIC_IMAGE_REGISTRY_BASE: ${{ env.GHCR_DESTINATION_ORG }}/
        run: |
          pip install go-task-bin==${{ env.TASKFILE_VERSION }}
          task init:ci
          task build
          cp ./dist/arduino*.whl ./containers/python-apps-base/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/arduino*.whl
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [check-changes, upload-whl]
    if: needs.check-changes.outputs.needs_build == 'true'
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    steps:
      - name: Log into ${{ env.GHCR_REGISTRY }} registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and build library
        env:
          PUBLIC_IMAGE_REGISTRY_BASE: ${{ env.GHCR_DESTINATION_ORG }}/
        run: |
          pip install go-task-bin==${{ env.TASKFILE_VERSION }}
          task init:ci
          task build
          cp ./dist/arduino*.whl ./containers/python-apps-base/

      # Add support for more platforms with QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata from the GitHub context
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=match,pattern=release\/(.*),group=1
          images: |
            ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/python-apps-base
          labels: |
            org.opencontainers.image.source=${{ env.GH_DESTINATION_REPO}}
            org.opencontainers.image.url=${{ env.GH_DESTINATION_REPO}}

      # Build and push Docker image with Buildx
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./containers/python-apps-base
          file: ./containers/python-apps-base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            # Set the base image registry. This is used to build the image only.
            REGISTRY=ghcr.io/arduino/

  retag:
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.check-changes.outputs.needs_build == 'false'
    steps:
      - name: Log into ${{ env.GHCR_REGISTRY }} registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Re-tag existing image to new version
        env:
          PREV_VERSION: ${{ needs.check-changes.outputs.prev_version }}
          NEW_VERSION: ${{ needs.check-changes.outputs.new_version }}
        run: |
          echo "Re-tagging python-apps-base from $PREV_VERSION to $NEW_VERSION"
          crane copy \
            ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/python-apps-base:${PREV_VERSION} \
            ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/python-apps-base:${NEW_VERSION}
