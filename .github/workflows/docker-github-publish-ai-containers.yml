name: AI Containers Release - Build and Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "ai/*"

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_DESTINATION_ORG: ghcr.io/arduino
  GH_DESTINATION_REPO: https://github.com/arduino/app-bricks-py

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      prev_version: ${{ steps.check.outputs.prev_version }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if container sources changed since last release
        id: check
        run: |
          # Extract the new version from the tag (ai/X.Y.Z -> X.Y.Z)
          NEW_VERSION="${GITHUB_REF_NAME#ai/}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          git fetch --tags

          # Find the previous ai/* tag (second most recent)
          PREV_TAG=$(git tag --sort=-version:refname | grep "^ai/" | sed -n '2p')

          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous ai release tag found — building from scratch"
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "prev_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          PREV_VERSION="${PREV_TAG#ai/}"
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous ai release tag: $PREV_TAG (version: $PREV_VERSION)"

          # Check if ei-models-runner sources changed since the previous tag
          CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- \
            containers/ei-models-runner/)

          if [[ -n "$CHANGED" ]]; then
            echo "Container sources changed since $PREV_TAG — full build required"
            echo "$CHANGED"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "No container source changes since $PREV_TAG — will re-tag existing image"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.check-changes.outputs.needs_build == 'true'
    steps:
      - name: Log into destination image registry ${{ env.GHCR_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      # Add support for more platforms with QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata from the GitHub context
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=match,pattern=ai\/(.*),group=1
          images: |
            ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/ei-models-runner
          labels: |
            org.opencontainers.image.source=${{ env.GH_DESTINATION_REPO}}
            org.opencontainers.image.url=${{ env.GH_DESTINATION_REPO}}

      # Build and push Docker image with Buildx
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./containers/ei-models-runner
          file: ./containers/ei-models-runner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # TODO: once the package is manually set to private in the GHCR UI, this step can be removed.
      # (ghcr.io/arduino → Package settings → Change visibility → Private)
      - name: Ensure package visibility is private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "/orgs/arduino/packages/container/app-bricks%2Fei-models-runner" -f visibility=private

      # Images are ready. Now modify files and create a PR.
      - name: Update AI container images references
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          echo "Updating ei-models-runner references to version ${VERSION}"
          find src -name "brick_compose.yaml" | while read f; do
            if grep -q "ei-models-runner" "$f"; then
              echo "  Updating: $f"
              sed -i -E "s|ei-models-runner:[0-9]+\.[0-9]+\.[0-9]+|ei-models-runner:${VERSION}|g" "$f"
            fi
          done

      - name: Configure Git
        run: |
          git config user.name "AppLab Actions Bot"
          git config user.email "bot@arduino.cc"

      - name: Create new branch name
        run: |
          BRANCH_NAME="ai-container-release-$(date +"%Y%m%d%H%M%S")"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        id: push_changes

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: update AI container images references"
          title: "[RELEASE BOT] Update AI container images references"
          body: |
            This PR was automatically generated by a GitHub Actions workflow.
            It includes modifications to update AI container images references after new release.
          branch: ${{ steps.push_changes.outputs.branch_name }}
          base: main
          draft: true

  retag:
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.check-changes.outputs.needs_build == 'false'
    steps:
      - name: Log into ${{ env.GHCR_REGISTRY }} registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Re-tag existing image to new version
        env:
          PREV_VERSION: ${{ needs.check-changes.outputs.prev_version }}
          NEW_VERSION: ${{ needs.check-changes.outputs.new_version }}
        run: |
          echo "Re-tagging ei-models-runner from $PREV_VERSION to $NEW_VERSION"
          crane copy \
            ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/ei-models-runner:${PREV_VERSION} \
            ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/ei-models-runner:${NEW_VERSION}

      # TODO: once the package is manually set to private in the GHCR UI, this step can be removed.
      # (ghcr.io/arduino → Package settings → Change visibility → Private)
      - name: Ensure package visibility is private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "/orgs/arduino/packages/container/app-bricks%2Fei-models-runner" -f visibility=private

      - name: Update AI container images references (retag path)
        run: |
          NEW_VERSION="${{ needs.check-changes.outputs.new_version }}"
          echo "Updating ei-models-runner references to version ${NEW_VERSION}"
          find src -name "brick_compose.yaml" | while read f; do
            if grep -q "ei-models-runner" "$f"; then
              echo "  Updating: $f"
              sed -i -E "s|ei-models-runner:[0-9]+\.[0-9]+\.[0-9]+|ei-models-runner:${NEW_VERSION}|g" "$f"
            fi
          done

      - name: Checkout repository for PR creation
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "AppLab Actions Bot"
          git config user.email "bot@arduino.cc"

      - name: Create new branch name
        id: push_changes
        run: |
          BRANCH_NAME="ai-container-release-$(date +"%Y%m%d%H%M%S")"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: update AI container images references"
          title: "[RELEASE BOT] Update AI container images references"
          body: |
            This PR was automatically generated by a GitHub Actions workflow.
            It includes modifications to update AI container images references after new release (re-tagged, no rebuild).
          branch: ${{ steps.push_changes.outputs.branch_name }}
          base: main
          draft: true
